{% extends 'core/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h2 class="h4 mb-0">{{ accion }} Usuario</h2>
        </div>
        <div class="card-body">
            <form method="POST" action="">
                {% csrf_token %}
                
                <h4 class="mb-3 text-secondary">Datos Personales</h4>
                <div class="form-group mb-4">
                    {{ form_persona.as_p }}
                </div>

                <hr>

                <h4 class="mb-3 text-secondary">Datos de la Cuenta (VibeSync)</h4>
                <div class="form-group mb-4">
                    {{ form_usuario.as_p }}
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="{% url 'administrar_usuarios' %}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-success">Guardar Usuario</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
